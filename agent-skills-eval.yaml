# Agent Skills Eval configuration
# Run with: npx agent-skills-eval --config agent-skills-eval.yaml

root: ./skills
workspace: ./agent-skills-workspace
baseline: true
target: gpt-4o-mini
judge: gpt-4o-mini
apiKeyEnv: OPENAI_API_KEY
concurrency: 2
layout: iteration
strict: false
